<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Weird Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2d2d2d;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }
        #game-container {
            display: block;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
        }
        canvas {
            width: 100%;
            height: 100%;
            object-fit: fill;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    <!-- The bundle.js will be injected here by webpack -->
</body>
</html>
