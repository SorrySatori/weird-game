<!DOCTYPE html>
<html>
<head>
    <title>Asset Generator</title>
    <style>
        body {
            background: #1a1a1a;
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        canvas {
            border: 2px solid #333;
            margin: 10px;
        }
        .asset-container {
            margin-bottom: 20px;
        }
        button {
            background: #2d2d2d;
            color: #7fff8e;
            border: 1px solid #7fff8e;
            padding: 10px 20px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #3d3d3d;
        }
    </style>
</head>
<body>
    <div class="asset-container">
        <h2>City Background</h2>
        <canvas id="cityCanvas" width="800" height="600"></canvas>
        <br>
        <button onclick="downloadCanvas('cityCanvas', 'city.jpg')">Download City Background</button>
    </div>

    <div class="asset-container">
        <h2>Ground Texture</h2>
        <canvas id="groundCanvas" width="800" height="100"></canvas>
        <br>
        <button onclick="downloadCanvas('groundCanvas', 'ground.png')">Download Ground Texture</button>
    </div>

    <div class="asset-container">
        <h2>Fungus Priest Spritesheet</h2>
        <canvas id="priestCanvas" width="256" height="64"></canvas>
        <br>
        <button onclick="downloadCanvas('priestCanvas', 'priest.png')">Download Priest Spritesheet</button>
    </div>

    <div class="asset-container">
        <h2>Dark Murmur Sound Effect</h2>
        <button onclick="generateAndDownload()">Generate Dark Murmur Sound</button>
    </div>

    <div class="asset-container">
        <h2>Cathedral Theme</h2>
        <button onclick="generateCathedralTheme()">Generate Cathedral Music</button>
    </div>

    <div class="asset-container">
        <h2>Market Theme</h2>
        <button onclick="generateMarketTheme()">Generate Market Music</button>
    </div>

    <div class="asset-container">
        <h2>Living Core</h2>
        <canvas id="livingCoreCanvas" width="128" height="128"></canvas>
        <br>
        <button onclick="downloadCanvas('livingCoreCanvas', 'living-core.png')">Download Living Core</button>
    </div>

    <script>
        function drawCity() {
            const canvas = document.getElementById('cityCanvas');
            const ctx = canvas.getContext('2d');

            // Dark background
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Add stars
            for (let i = 0; i < 100; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * (canvas.height * 0.7);
                const size = Math.random() * 2;
                ctx.fillStyle = `rgba(127, 255, 142, ${Math.random() * 0.5})`;
                ctx.fillRect(x, y, size, size);
            }

            // Draw weird buildings
            for (let i = 0; i < 10; i++) {
                const x = i * 80 + Math.random() * 40;
                const height = 200 + Math.random() * 300;
                const width = 60 + Math.random() * 20;
                
                // Building base
                ctx.fillStyle = '#2d2d2d';
                ctx.fillRect(x, canvas.height - height, width, height);
                
                // Windows
                for (let j = 0; j < height/30; j++) {
                    if (Math.random() > 0.3) {
                        ctx.fillStyle = `rgba(127, 255, 142, ${Math.random() * 0.3})`;
                        ctx.fillRect(x + 10, canvas.height - height + j * 30 + 10, width - 20, 10);
                    }
                }
                
                // Weird architectural details
                ctx.fillStyle = '#3d3d3d';
                ctx.beginPath();
                ctx.moveTo(x, canvas.height - height);
                ctx.lineTo(x + width/2, canvas.height - height - 30);
                ctx.lineTo(x + width, canvas.height - height);
                ctx.fill();
            }

            // Add fog
            ctx.fillStyle = 'rgba(127, 255, 142, 0.1)';
            for (let i = 0; i < 5; i++) {
                ctx.beginPath();
                ctx.ellipse(
                    Math.random() * canvas.width,
                    canvas.height - 100 - Math.random() * 200,
                    100,
                    50,
                    0,
                    0,
                    Math.PI * 2
                );
                ctx.fill();
            }
        }

        function drawGround() {
            const canvas = document.getElementById('groundCanvas');
            const ctx = canvas.getContext('2d');

            // Base color
            ctx.fillStyle = '#2d2d2d';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Add texture
            for (let i = 0; i < 200; i++) {
                ctx.fillStyle = `rgba(127, 255, 142, ${Math.random() * 0.2})`;
                ctx.beginPath();
                ctx.ellipse(
                    Math.random() * canvas.width,
                    Math.random() * canvas.height,
                    Math.random() * 10,
                    Math.random() * 5,
                    Math.random() * Math.PI,
                    0,
                    Math.PI * 2
                );
                ctx.fill();
            }
        }

        function drawPriest() {
            const canvas = document.getElementById('priestCanvas');
            const ctx = canvas.getContext('2d');
            const frameWidth = 64;

            // Clear canvas
            ctx.fillStyle = 'rgba(0, 0, 0, 0)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw 4 animation frames
            for (let frame = 0; frame < 4; frame++) {
                const x = frame * frameWidth;
                
                // Draw robe base
                ctx.fillStyle = '#2d2d2d';
                ctx.beginPath();
                ctx.moveTo(x + 32, 10);
                ctx.lineTo(x + 45, 60);
                ctx.lineTo(x + 19, 60);
                ctx.closePath();
                ctx.fill();

                // Draw hood
                ctx.fillStyle = '#3d3d3d';
                ctx.beginPath();
                ctx.arc(x + 32, 15, 10, 0, Math.PI * 2);
                ctx.fill();

                // Draw glowing eyes
                ctx.fillStyle = '#7fff8e';
                ctx.beginPath();
                ctx.arc(x + 29, 15, 2, 0, Math.PI * 2);
                ctx.arc(x + 35, 15, 2, 0, Math.PI * 2);
                ctx.fill();

                // Add animation pose
                const offset = Math.sin(frame * Math.PI/2) * 3;
                ctx.fillStyle = '#2d2d2d';
                ctx.fillRect(x + 25 + offset, 60, 4, 4);
                ctx.fillRect(x + 35 - offset, 60, 4, 4);
            }
        }

        function drawLivingCore() {
            const canvas = document.getElementById('livingCoreCanvas');
            const ctx = canvas.getContext('2d');
            
            // Clear canvas with transparency
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Create gradient for the core
            const gradient = ctx.createRadialGradient(
                canvas.width/2, canvas.height/2, 10,
                canvas.width/2, canvas.height/2, 50
            );
            gradient.addColorStop(0, '#7fff8e');    // Bright green center
            gradient.addColorStop(0.3, '#2a623d');  // Dark green middle
            gradient.addColorStop(1, 'rgba(42, 98, 61, 0)'); // Transparent edge
            
            // Draw the main core
            ctx.beginPath();
            ctx.arc(canvas.width/2, canvas.height/2, 50, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();
            
            // Add some "veins" or energy lines
            for (let i = 0; i < 8; i++) {
                const angle = (Math.PI * 2 * i) / 8;
                const length = 30 + Math.random() * 20;
                
                ctx.beginPath();
                ctx.moveTo(
                    canvas.width/2 + Math.cos(angle) * 20,
                    canvas.height/2 + Math.sin(angle) * 20
                );
                ctx.lineTo(
                    canvas.width/2 + Math.cos(angle) * length,
                    canvas.height/2 + Math.sin(angle) * length
                );
                ctx.strokeStyle = '#7fff8e';
                ctx.lineWidth = 2;
                ctx.globalAlpha = 0.6;
                ctx.stroke();
            }
            
            // Add some glowing particles
            for (let i = 0; i < 20; i++) {
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 40;
                const x = canvas.width/2 + Math.cos(angle) * distance;
                const y = canvas.height/2 + Math.sin(angle) * distance;
                
                ctx.beginPath();
                ctx.arc(x, y, 1, 0, Math.PI * 2);
                ctx.fillStyle = '#7fff8e';
                ctx.globalAlpha = Math.random() * 0.5 + 0.2;
                ctx.fill();
            }
            
            ctx.globalAlpha = 1;
        }

        function downloadCanvas(canvasId, filename) {
            const canvas = document.getElementById(canvasId);
            const link = document.createElement('a');
            link.download = filename;
            link.href = canvas.toDataURL();
            link.click();
        }

        async function generateAndDownload() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const duration = 1.0;
            
            // Create oscillators for deep murmur
            const osc1 = audioContext.createOscillator();
            const osc2 = audioContext.createOscillator();
            const osc3 = audioContext.createOscillator();
            
            // Set frequencies for deep, dark sound
            osc1.frequency.value = 80;  // Very low base frequency
            osc2.frequency.value = 120; // Slightly higher for texture
            osc3.frequency.value = 160; // Higher harmonic
            
            // Create gain nodes for volume control
            const gainNode1 = audioContext.createGain();
            const gainNode2 = audioContext.createGain();
            const gainNode3 = audioContext.createGain();
            
            // Set initial volumes
            gainNode1.gain.value = 0.3;
            gainNode2.gain.value = 0.2;
            gainNode3.gain.value = 0.1;
            
            // Create filter for dark sound
            const filter = audioContext.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 400;
            filter.Q.value = 1;
            
            // Connect oscillators to gains
            osc1.connect(gainNode1);
            osc2.connect(gainNode2);
            osc3.connect(gainNode3);
            
            // Connect gains to filter
            gainNode1.connect(filter);
            gainNode2.connect(filter);
            gainNode3.connect(filter);
            
            // Connect filter to destination
            filter.connect(audioContext.destination);
            
            // Create modulation for murmur effect
            const modulator = audioContext.createOscillator();
            modulator.frequency.value = 4;
            const modulatorGain = audioContext.createGain();
            modulatorGain.gain.value = 40;
            modulator.connect(modulatorGain);
            
            // Apply modulation to all oscillators
            modulatorGain.connect(osc1.frequency);
            modulatorGain.connect(osc2.frequency);
            modulatorGain.connect(osc3.frequency);
            
            // Start all oscillators
            const startTime = audioContext.currentTime;
            osc1.start(startTime);
            osc2.start(startTime);
            osc3.start(startTime);
            modulator.start(startTime);
            
            // Create volume envelope
            gainNode1.gain.setValueAtTime(0, startTime);
            gainNode2.gain.setValueAtTime(0, startTime);
            gainNode3.gain.setValueAtTime(0, startTime);
            
            gainNode1.gain.linearRampToValueAtTime(0.3, startTime + 0.1);
            gainNode2.gain.linearRampToValueAtTime(0.2, startTime + 0.1);
            gainNode3.gain.linearRampToValueAtTime(0.1, startTime + 0.1);
            
            gainNode1.gain.linearRampToValueAtTime(0, startTime + duration);
            gainNode2.gain.linearRampToValueAtTime(0, startTime + duration);
            gainNode3.gain.linearRampToValueAtTime(0, startTime + duration);
            
            // Stop oscillators
            osc1.stop(startTime + duration);
            osc2.stop(startTime + duration);
            osc3.stop(startTime + duration);
            modulator.stop(startTime + duration);
            
            // Record the audio
            const mediaStreamDest = audioContext.createMediaStreamDestination();
            filter.connect(mediaStreamDest);
            
            const mediaRecorder = new MediaRecorder(mediaStreamDest.stream);
            const audioChunks = [];
            
            mediaRecorder.ondataavailable = (event) => {
                audioChunks.push(event.data);
            };
            
            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                const audioUrl = URL.createObjectURL(audioBlob);
                const link = document.createElement('a');
                link.href = audioUrl;
                link.download = 'dialog-murmur.wav';
                link.click();
            };
            
            mediaRecorder.start();
            setTimeout(() => {
                mediaRecorder.stop();
            }, duration * 1000 + 100);
        }

        // Audio context for music generation
        let audioCtx;

        function initAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            return audioCtx;
        }

        function generateCathedralTheme() {
            const ctx = initAudioContext();
            const duration = 60; // 1 minute loop
            const sampleRate = ctx.sampleRate;
            const buffer = ctx.createBuffer(2, sampleRate * duration, sampleRate);
            
            for (let channel = 0; channel < 2; channel++) {
                const data = buffer.getChannelData(channel);
                
                for (let i = 0; i < buffer.length; i++) {
                    const t = i / sampleRate;
                    let sample = 0;
                    
                    // Main melody in Dm (using a pentatonic scale for mystical feel)
                    const melodyPhase = Math.floor(t * 0.25) % 8; // 8-bar melody
                    const notes = [146.83, 174.61, 220.00, 293.66, 349.23]; // D3, F3, A3, D4, F4
                    const melodyNote = notes[Math.floor(melodyPhase * 1.5) % notes.length];
                    const melodyEnv = Math.exp(-5 * (t % 4));
                    sample += 0.2 * Math.sin(2 * Math.PI * melodyNote * t) * melodyEnv;
                    
                    // Organ chords
                    const chordNotes = [
                        [146.83, 220.00, 293.66], // Dm
                        [174.61, 220.00, 349.23], // F
                        [196.00, 293.66, 392.00], // G
                        [146.83, 220.00, 293.66]  // Dm
                    ];
                    const chordPhase = Math.floor(t * 0.125) % 4;
                    chordNotes[chordPhase].forEach(note => {
                        sample += 0.1 * Math.sin(2 * Math.PI * note * t);
                    });
                    
                    // Ethereal high notes with more complex modulation
                    const vibrato = Math.sin(2 * Math.PI * 5 * t) * 3;
                    const shimmer = 0.05 * Math.sin(2 * Math.PI * 587.33 * t + vibrato);
                    sample += shimmer * (0.5 + 0.5 * Math.sin(2 * Math.PI * 0.125 * t));
                    
                    // Choir-like pad
                    const choirFreq = 220.00; // A3
                    const choirVibrato = Math.sin(2 * Math.PI * 6 * t) * 2;
                    sample += 0.15 * Math.sin(2 * Math.PI * choirFreq * t + choirVibrato);
                    
                    // Apply envelope and reverb simulation
                    const envelope = 0.5 + 0.5 * Math.sin(2 * Math.PI * 0.025 * t);
                    const reverb = 0.3 * Math.sin(2 * Math.PI * 73.42 * t) * Math.exp(-2 * (t % 2));
                    data[i] = (sample + reverb) * 0.4 * envelope;
                }
            }
            
            // Export
            const wavData = audioBufferToWav(buffer);
            const blob = new Blob([wavData], { type: 'audio/wav' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'cathedral-theme.mp3';
            a.click();
            URL.revokeObjectURL(url);
        }

        function generateMarketTheme() {
            const ctx = initAudioContext();
            const duration = 45; // 45 second loop
            const sampleRate = ctx.sampleRate;
            const buffer = ctx.createBuffer(2, sampleRate * duration, sampleRate);
            
            for (let channel = 0; channel < 2; channel++) {
                const data = buffer.getChannelData(channel);
                
                for (let i = 0; i < buffer.length; i++) {
                    const t = i / sampleRate;
                    let sample = 0;
                    
                    // Base melody in Em with folk-like progression
                    const baseFreq = 164.81; // E3
                    const progression = [1, 1.2, 1.5, 0.8]; // Em, G, B, C
                    const progPhase = Math.floor(t * 0.5) % progression.length;
                    sample += 0.15 * Math.sin(2 * Math.PI * baseFreq * progression[progPhase] * t);
                    
                    // Market voices simulation
                    const voices = 5;
                    for (let v = 0; v < voices; v++) {
                        const voicePhase = Math.floor(t * 0.2 + v) % 8;
                        if (voicePhase < 2) { // Random voice occurrence
                            const pitch = 200 + v * 50 + Math.sin(t * 10) * 20; // Different pitch for each voice
                            const voiceEnv = Math.exp(-8 * ((t + v) % 1));
                            sample += 0.05 * Math.sin(2 * Math.PI * pitch * t) * voiceEnv;
                        }
                    }
                    
                    // Footsteps and movement sounds
                    const stepPhase = Math.floor(t * 4) % 8;
                    if (stepPhase === 0 || stepPhase === 2) {
                        const stepEnv = Math.exp(-30 * (t % 0.25));
                        sample += 0.1 * (Math.random() * 2 - 1) * stepEnv;
                    }
                    
                    // Distant chatter
                    const chatterFreq = 300 + Math.sin(t * 5) * 50;
                    sample += 0.03 * Math.sin(2 * Math.PI * chatterFreq * t) * 
                             (0.5 + 0.5 * Math.sin(2 * Math.PI * 0.1 * t));
                    
                    // Market ambiance (rustling, movement)
                    const noise = Math.random() * 0.08;
                    const ambientSwell = 0.5 + 0.3 * Math.sin(2 * Math.PI * 0.05 * t);
                    sample += noise * ambientSwell;
                    
                    // Occasional bell sounds (like shop doors)
                    if (Math.floor(t * 0.2) % 15 === 0) {
                        const bellEnv = Math.exp(-3 * (t % 5));
                        sample += 0.1 * Math.sin(2 * Math.PI * 880 * t) * bellEnv;
                    }
                    
                    // Apply envelope
                    const envelope = 0.7 + 0.3 * Math.sin(2 * Math.PI * 0.033 * t);
                    data[i] = sample * 0.5 * envelope;
                }
            }
            
            // Export
            const wavData = audioBufferToWav(buffer);
            const blob = new Blob([wavData], { type: 'audio/wav' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'market-theme.mp3';
            a.click();
            URL.revokeObjectURL(url);
        }

        // WAV file generation helper function
        function audioBufferToWav(buffer) {
            const numChannels = buffer.numberOfChannels;
            const sampleRate = buffer.sampleRate;
            const format = 1; // PCM
            const bitDepth = 16;
            
            const bytesPerSample = bitDepth / 8;
            const blockAlign = numChannels * bytesPerSample;
            
            const buffer32 = new ArrayBuffer(44 + buffer.length * blockAlign);
            const view = new DataView(buffer32);
            
            // Write WAV header
            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + buffer.length * blockAlign, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, format, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * blockAlign, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitDepth, true);
            writeString(view, 36, 'data');
            view.setUint32(40, buffer.length * blockAlign, true);
            
            // Write audio data
            const offset = 44;
            for (let i = 0; i < buffer.length; i++) {
                for (let channel = 0; channel < numChannels; channel++) {
                    const sample = Math.max(-1, Math.min(1, buffer.getChannelData(channel)[i]));
                    view.setInt16(offset + (i * blockAlign) + (channel * bytesPerSample),
                                sample < 0 ? sample * 0x8000 : sample * 0x7FFF,
                                true);
                }
            }
            
            return buffer32;
        }

        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        }

        // Generate assets
        drawCity();
        drawGround();
        drawPriest();
        drawLivingCore();
    </script>
</body>
</html>
