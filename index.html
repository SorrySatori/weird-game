<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Weird Game</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #2d2d2d;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #game-container {
            position: relative;
            width: 95vmin; /* Use viewport-relative units */
            height: 75vmin; /* Maintain 4:3 aspect ratio (800x600) */
            margin: 0 auto;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100% !important; /* Force the canvas to use the container size */
            height: 100% !important;
            max-width: 100%;
            max-height: 100%;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script src="node_modules/phaser/dist/phaser.min.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
